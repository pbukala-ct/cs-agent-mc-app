deployAs:
  - name: cs-agent-management
    applicationType: merchant-center-custom-application
    configuration:
      standardConfiguration:
        - key: CUSTOM_APPLICATION_ID
          description: The Custom Application ID from Merchant Center Settings
          required: true
        - key: CLOUD_IDENTIFIER
          description: "Cloud region identifier (e.g. gcp-eu, gcp-us, aws-eu, aws-us)"
          default: gcp-eu
        - key: ENTRY_POINT_URI_PATH
          description: The entry point URI path registered in Merchant Center
          default: cs-agent-management
